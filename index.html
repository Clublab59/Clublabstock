<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Clublab</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #f5f5f0; color: #1a1a1a; }
header { background: #1a1a1a; color: white; padding: 16px 20px; display: flex; align-items: center; gap: 10px; }
header h1 { font-size: 17px; font-weight: 600; flex: 1; }
header span { font-size: 12px; color: #aaa; }
nav { display: flex; background: white; border-bottom: 2px solid #eee; }
nav button { flex: 1; padding: 14px; font-size: 14px; font-weight: 600; border: none; background: none; cursor: pointer; color: #999; border-bottom: 3px solid transparent; margin-bottom: -2px; }
nav button.on { color: #1a1a1a; border-bottom-color: #1a1a1a; }
section { display: none; padding: 16px; }
section.on { display: block; }
.card { background: white; border-radius: 10px; padding: 18px; margin-bottom: 12px; }
.card h3 { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
.card p { font-size: 13px; color: #555; line-height: 1.6; margin-bottom: 8px; }
input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 8px; }
.btn { display: inline-block; padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; margin-right: 8px; margin-top: 4px; }
.btn-dark { background: #1a1a1a; color: white; }
.btn-green { background: #16a34a; color: white; }
.btn-red { background: #dc2626; color: white; }
.btn-gray { background: #eee; color: #333; }
.art { background: white; border-left: 4px solid #1a1a1a; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
.art h2 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.art .meta { font-size: 12px; color: #999; margin-bottom: 12px; }
.art .qty { font-size: 36px; font-weight: 800; margin-bottom: 12px; }
.row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
.row label { font-size: 13px; color: #555; white-space: nowrap; }
.row input { width: 70px; margin: 0; padding: 8px; text-align: center; font-size: 16px; }
.search { background: white; border-radius: 8px; padding: 10px 14px; margin-bottom: 10px; display: flex; gap: 8px; align-items: center; }
.search input { flex: 1; border: none; outline: none; font-size: 14px; margin: 0; padding: 0; width: auto; }
.filters { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 10px; padding-bottom: 2px; }
.chip { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 1px solid #ddd; background: white; cursor: pointer; white-space: nowrap; color: #666; }
.chip.on { background: #1a1a1a; color: white; border-color: #1a1a1a; }
.item { background: white; border-radius: 8px; padding: 12px 14px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.item:hover { background: #f9f9f9; }
.item-name { font-size: 13px; font-weight: 500; }
.item-meta { font-size: 11px; color: #aaa; margin-top: 2px; }
.item-qty { font-size: 15px; font-weight: 800; min-width: 30px; text-align: right; }
.qty-ok { color: #16a34a; }
.qty-low { color: #f59e0b; }
.qty-zero { color: #dc2626; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 12px 20px; border-radius: 30px; font-size: 14px; font-weight: 600; color: white; background: #1a1a1a; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; }
.toast.show { opacity: 1; }
.prog { font-size: 13px; color: #555; margin-top: 10px; display: none; line-height: 1.8; }
</style>
</head>
<body>

<header>
  <h1>Stock Clublab</h1>
  <span id="nst">Notion non connecte</span>
</header>

<nav>
  <button id="t1" class="on" onclick="show('s1','t1')">Scanner</button>
  <button id="t2" onclick="show('s2','t2')">Stock</button>
  <button id="t3" onclick="show('s3','t3')">Config</button>
</nav>

<section id="s1" class="on">
  <div class="card">
    <h3>Scanner un QR code</h3>
    <div id="reader" style="margin-bottom:10px;"></div>
    <div class="row">
      <input type="text" id="mid" placeholder="Saisir ID (ex: ART-0001)" style="flex:1;margin:0;" />
      <button class="btn btn-dark" onclick="lookup()">OK</button>
    </div>
  </div>
  <div id="artcard" style="display:none;" class="art">
    <h2 id="artname"></h2>
    <div class="meta" id="artmeta"></div>
    <div class="qty" id="artqty">-</div>
    <div class="row">
      <label>Quantite :</label>
      <input type="number" id="qtyval" value="1" min="1" />
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-green" onclick="move(1)">+ Entree</button>
      <button class="btn btn-red" onclick="move(-1)">- Sortie</button>
    </div>
  </div>
</section>

<section id="s2">
  <div class="search">
    <span>&#128269;</span>
    <input type="text" id="sq" placeholder="Rechercher..." oninput="renderList()" />
  </div>
  <div class="filters" id="filters"></div>
  <div id="list"></div>
</section>

<section id="s3">
  <div class="card">
    <h3>Cle API Notion</h3>
    <input type="password" id="nkey" placeholder="ntn_xxxxxxxxxxxx" />
    <h3 style="margin-top:4px;">ID de la base Notion</h3>
    <input type="text" id="ndb" placeholder="34407a013b33807298f3eaacb02cca6b" />
    <button class="btn btn-gray" onclick="saveConf()">Sauvegarder</button>
    <button class="btn btn-dark" onclick="testConn()">Tester la connexion</button>
  </div>
  <div class="card">
    <h3>Importer les 238 articles vers Notion</h3>
    <p>A faire une seule fois apres avoir configure et teste la connexion.</p>
    <button class="btn btn-dark" onclick="doImport()">Lancer l'import</button>
    <div class="prog" id="prog"></div>
  </div>
  <div class="card">
    <h3>Telecharger les QR codes</h3>
    <p>Fichier HTML a imprimer, un QR par article.</p>
    <button class="btn btn-gray" onclick="dlQR()">Telecharger</button>
  </div>
</section>

<div class="toast" id="toast"></div>

  document.querySelectorAll('section').forEach(function(s) { s.classList.remove('on'); });
  document.querySelectorAll('nav button').forEach(function(b) { b.classList.remove('on'); });
  document.getElementById(sid).classList.add('on');
  document.getElementById(tid).classList.add('on');
}

var S = {};
ARTS.forEach(function(a) { S[a.id] = Object.assign({}, a); });

var NK = localStorage.getItem('nk') || '';
var NDB = localStorage.getItem('ndb') || '';
var NPIDS = JSON.parse(localStorage.getItem('npids') || '{}');
document.getElementById('nkey').value = NK;
document.getElementById('ndb').value = NDB;
if (NK && NDB) document.getElementById('nst').textContent = 'Notion connecte';

var FC = 'Tous';
var cats = ['Tous'];
ARTS.forEach(function(a) { if (cats.indexOf(a.categorie) === -1) cats.push(a.categorie); });
var frow = document.getElementById('filters');
cats.forEach(function(c) {
  var d = document.createElement('div');
  d.className = 'chip' + (c === 'Tous' ? ' on' : '');
  d.textContent = c;
  d.onclick = function() {
    FC = c;
    document.querySelectorAll('.chip').forEach(function(x) { x.classList.remove('on'); });
    d.classList.add('on');
    renderList();
  };
  frow.appendChild(d);
});
renderList();

function renderList() {
  var q = document.getElementById('sq').value.toLowerCase();
  var items = Object.values(S).filter(function(a) {
    return (FC === 'Tous' || a.categorie === FC) && (!q || a.label.toLowerCase().indexOf(q) !== -1 || a.id.toLowerCase().indexOf(q) !== -1);
  });
  document.getElementById('list').innerHTML = items.map(function(a) {
    var cls = a.qty === 0 ? 'qty-zero' : a.qty <= 2 ? 'qty-low' : 'qty-ok';
    return '<div class="item" onclick="goScan(\'' + a.id + '\')"><div><div class="item-name">' + a.label + '</div><div class="item-meta">' + a.id + '</div></div><div class="item-qty ' + cls + '">' + a.qty + '</div></div>';
  }).join('') || '<p style="text-align:center;color:#aaa;padding:20px;">Aucun resultat</p>';
}

function goScan(id) {
  show('s1', 't1');
  document.getElementById('mid').value = id;
  lookup();
}

function lookup() {
  var v = document.getElementById('mid').value.trim().toUpperCase();
  if (S[v]) { showArt(S[v]); document.getElementById('mid').value = ''; }
  else toast('Introuvable : ' + v, 'red');
}

var CUR = null;
function showArt(a) {
  CUR = a.id;
  document.getElementById('artname').textContent = a.label;
  document.getElementById('artmeta').textContent = a.id + ' - ' + (a.fournisseur || '-') + ' - ' + a.emplacement;
  document.getElementById('artqty').textContent = S[a.id].qty;
  document.getElementById('artcard').style.display = 'block';
}

function move(dir) {
  if (!CUR) return;
  var n = parseInt(document.getElementById('qtyval').value) || 1;
  var nq = Math.max(0, S[CUR].qty + dir * n);
  S[CUR].qty = nq;
  document.getElementById('artqty').textContent = nq;
  renderList();
  if (NK && NDB && NPIDS[CUR]) {
    notionCall('PATCH', '/pages/' + NPIDS[CUR], { properties: { 'Quantite': { number: nq } } })
      .then(function(r) {
        toast(dir > 0 ? '+' + n + ' ajoute' : '-' + n + ' sorti', r && r.object === 'page' ? 'green' : 'orange');
      });
  } else {
    toast(dir > 0 ? '+' + n + ' ajoute (local)' : '-' + n + ' sorti (local)', 'green');
  }
}

function notionCall(method, path, body) {
  return fetch('/.netlify/functions/notion', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ method: method, path: path, key: NK, body: body })
  }).then(function(r) { return r.json(); }).catch(function(e) { console.error(e); return null; });
}

function saveConf() {
  NK = document.getElementById('nkey').value.trim();
  NDB = document.getElementById('ndb').value.trim().replace(/-/g, '');
  localStorage.setItem('nk', NK);
  localStorage.setItem('ndb', NDB);
  toast('Sauvegarde !', 'green');
  if (NK && NDB) document.getElementById('nst').textContent = 'Notion connecte';
}

function testConn() {
  NK = document.getElementById('nkey').value.trim();
  NDB = document.getElementById('ndb').value.trim().replace(/-/g, '');
  if (!NK || !NDB) { toast('Renseignez la cle et l ID', 'red'); return; }
  toast('Test en cours...', 'gray');
  notionCall('GET', '/databases/' + NDB).then(function(r) {
    if (r && r.object === 'database') {
      toast('Connexion reussie !', 'green');
      document.getElementById('nst').textContent = 'Notion connecte';
    } else {
      toast('Erreur : ' + (r && r.message ? r.message : 'echec'), 'red');
    }
  });
}

function doImport() {
  NK = document.getElementById('nkey').value.trim();
  NDB = document.getElementById('ndb').value.trim().replace(/-/g, '');
  if (!NK || !NDB) { toast('Sauvegardez la config dabord', 'red'); return; }
  var prog = document.getElementById('prog');
  prog.style.display = 'block';
  prog.textContent = 'Preparation...';
  var props = {
    'Name': {title: {}}, 'ID': {rich_text: {}}, 'Categorie': {select: {}},
    'Produit': {rich_text: {}}, 'Modele': {rich_text: {}}, 'Couleur': {rich_text: {}},
    'Taille': {select: {}}, 'Sexe': {select: {}}, 'Fournisseur': {rich_text: {}},
    'Client': {rich_text: {}}, 'Emplacement': {select: {}}, 'Quantite': {number: {format: 'number'}}
  };
  notionCall('PATCH', '/databases/' + NDB, {properties: props}).then(function() {
    var i = 0;
    function next() {
      if (i >= ARTS.length) {
        localStorage.setItem('npids', JSON.stringify(NPIDS));
        prog.textContent = 'Termine ! ' + i + ' articles importes dans Notion.';
        toast('Import termine !', 'green');
        return;
      }
      var a = ARTS[i];
      prog.textContent = 'Import... ' + i + ' / ' + ARTS.length + ' (' + a.id + ')';
      notionCall('POST', '/pages', {
        parent: {database_id: NDB},
        properties: {
          'Name': {title: [{text: {content: a.label}}]},
          'ID': {rich_text: [{text: {content: a.id}}]},
          'Categorie': {select: {name: a.categorie || 'Autre'}},
          'Produit': {rich_text: [{text: {content: a.produit || ''}}]},
          'Modele': {rich_text: [{text: {content: a.modele || ''}}]},
          'Couleur': {rich_text: [{text: {content: a.couleur || ''}}]},
          'Taille': {select: {name: a.taille || 'TU'}},
          'Sexe': {select: {name: a.sexe || 'Unisexe'}},
          'Fournisseur': {rich_text: [{text: {content: a.fournisseur || ''}}]},
          'Client': {rich_text: [{text: {content: a.client || ''}}]},
          'Emplacement': {select: {name: a.emplacement || 'stock'}},
          'Quantite': {number: a.qty}
        }
      }).then(function(r) {
        if (r && r.id) NPIDS[a.id] = r.id;
        i++;
        setTimeout(next, 400);
      });
    }
    next();
  });
}

function dlQR() {
  var rows = ARTS.map(function(a) { return JSON.stringify({id: a.id, l: a.label}); }).join(',');
  var h = '<!DOCTYPE html><html><head><meta charset="UTF-8"><style>div.p{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px}.c{border:1px solid #ddd;border-radius:6px;padding:8px;text-align:center;break-inside:avoid}.c p{font-size:8px;margin:4px 0;word-break:break-word}.c b{font-size:9px;display:block}@media print{@page{size:A4;margin:8mm}}<\/style><script src="https://unpkg.com/qrcodejs@1.0.0/qrcode.min.js"><\/script><\/head><body><div class="p" id="c"><\/div><script>[' + rows + '].forEach(function(a){var d=document.createElement("div");d.className="c";var q=document.createElement("div");d.appendChild(q);var b=document.createElement("b");b.textContent=a.id;d.appendChild(b);var p=document.createElement("p");p.textContent=a.l;d.appendChild(p);document.getElementById("c").appendChild(d);new QRCode(q,{text:a.id,width:80,height:80});});<\/script><\/body><\/html>';
  var blob = new Blob([h], {type: 'text/html'});
  var url = URL.createObjectURL(blob);
  var x = document.createElement('a'); x.href = url; x.download = 'QR_Clublab.html'; x.click();
  toast('QR codes telecharges !', 'green');
}

function toast(msg, color) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color === 'green' ? '#16a34a' : color === 'red' ? '#dc2626' : color === 'orange' ? '#f59e0b' : '#555';
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

document.getElementById('mid').addEventListener('keydown', function(e) { if (e.key === 'Enter') lookup(); });
</script>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" onload="startCamera()"></script>
<script>
function startCamera() {
  try {
    var qr = new Html5Qrcode("reader");
    qr.start({facingMode:"environment"},{fps:10,qrbox:200},
      function(txt) {
        var v = txt.trim().toUpperCase();
        if (S[v]) showArt(S[v]);
        else toast('Introuvable : ' + v, 'red');
      }, function() {})
    .catch(function() {
      document.getElementById('reader').innerHTML = '<p style="color:#aaa;font-size:12px;padding:8px 0;">Camera non disponible - saisie manuelle</p>';
    });
  } catch(e) {
    document.getElementById('reader').innerHTML = '<p style="color:#aaa;font-size:12px;padding:8px 0;">Camera non disponible - saisie manuelle</p>';
  }
}
</script>
